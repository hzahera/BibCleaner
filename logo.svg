<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 360" width="1180" height="360" role="img" aria-label="BibCleaner">
  <title>BibCleaner</title>

  <!-- ===== Icon: open book ===== -->
  <g>
    <!-- left page -->
    <path d="M174,132 C146,116 110,116 84,126 L84,244 C110,234 146,234 174,252 Z"
          fill="#143A56"/>
    <!-- right page -->
    <path d="M186,132 C214,116 250,116 276,126 L276,244 C250,234 214,234 186,252 Z"
          fill="#143A56"/>

    <!-- highlighted text lines (left page) -->
    <g stroke="#1FB8A6" stroke-width="9" stroke-linecap="round">
      <line x1="103" y1="153" x2="160" y2="153"/>
      <line x1="100" y1="180" x2="160" y2="180"/>
      <line x1="100" y1="207" x2="146" y2="207"/>
      <!-- right page -->
      <line x1="200" y1="153" x2="257" y2="153"/>
      <line x1="200" y1="180" x2="260" y2="180"/>
      <line x1="214" y1="207" x2="260" y2="207"/>
    </g>

    <!-- sparkle (clean / polished) -->
    <path d="M286,72 L296,98 L322,108 L296,118 L286,144 L276,118 L250,108 L276,98 Z"
          fill="#1FB8A6"/>
    <path d="M305,150 L310,162 L322,167 L310,172 L305,184 L300,172 L288,167 L300,162 Z"
          fill="#1FB8A6" opacity="0.85"/>
  </g>

  <!-- ===== Wordmark ===== -->
  <text x="372" y="196" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="118" fill="#143A56"
        letter-spacing="-2">
    <tspan font-weight="500">Bib</tspan><tspan font-weight="800">Cleaner</tspan>
  </text>

  <!-- ===== Tagline ===== -->
  <text x="376" y="250" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="27" font-weight="600"
        fill="#143A56" fill-opacity="0.55" letter-spacing="5.5">BIBLIOGRAPHY METADATA CLEANER</text>
</svg>
